name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release assets
        run: |
          chmod +x scripts/package_release.sh
          scripts/package_release.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(dist/MiniDone-macOS-v*.dmg dist/MiniDone-macOS-v*.zip)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "MiniDone ${GITHUB_REF_NAME}" \
              --notes-file docs/github/release-notes.md
          fi
